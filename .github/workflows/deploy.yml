name: "Zero-Tolerance FinOps Enterprise Pipeline"

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', '.gitignore'] # MUST IGNORE DOCS
  pull_request:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', '.gitignore'] # MUST IGNORE DOCS

permissions:
  id-token: write      # Required for OIDC authentication with AWS
  contents: read
  pull-requests: write # Required so the bot can post comments on your PRs

jobs:
  # ==========================================
  # STAGE 1: QUALITY GATES (Format & Validate)
  # ==========================================
  quality-gates:
    name: "Quality & Syntax"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python linting
        run: ruff check src tests

      - name: Run Python tests
        run: pytest -q

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (provider only, no backend)
        working-directory: ./terraform
        run: terraform init -backend=false -no-color

      - name: Terraform Format Check
        working-directory: ./terraform
        run: terraform fmt -check
        
      - name: Terraform Validate
        working-directory: ./terraform
        run: terraform validate -no-color

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@v4

      - name: Terraform Linting (tflint)
        working-directory: ./terraform
        run: tflint --no-color

  # ==========================================
  # STAGE 2: SECURITY SCANS (tfsec & Checkov)
  # ==========================================
  security-scans:
    name: "Security Audit"
    needs: quality-gates    # <--- Waits for Stage 1 to pass
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Security Scan (tfsec)
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: ./terraform
          soft_fail: true

      - name: Checkov Security Scan       
        uses: bridgecrewio/checkov-action@master
        with:
          directory: ./terraform
          framework: terraform
          soft_fail: true

  # ==========================================
  # STAGE 3: EXECUTE (Plan & Deploy to AWS)
  # ==========================================
  deploy:
    name: "Execute Deployment"
    needs: security-scans   # <--- Waits for Stage 2 to pass
    runs-on: ubuntu-latest
    env:
      TF_VAR_security_alert_email: ${{ secrets.SECURITY_ALERT_EMAIL }}
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (Passwordless OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (Connect to AWS Backend)
        working-directory: ./terraform
        
        run: |
          # 1. Get the Account ID and IMMEDIATELY strip hidden characters (tr -d)
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text | tr -d '\r\n[:space:]')
          
          # 2. Construct the bucket name dynamically
          BUCKET_NAME="zero-tolerance-state-${ACCOUNT_ID}"
          
          echo "Connecting to bucket: $BUCKET_NAME"
          
          # 3. Initialize with the dynamic bucket name
          terraform init -no-color \
            -backend-config="bucket=${BUCKET_NAME}" \
            -backend-config="key=zero-tolerance/terraform.tfstate" \
            -backend-config="region=ap-south-1"

      

      - name: Terraform Plan
        id: plan
        working-directory: ./terraform
        run: |
          # 1. Run the plan and save it
          terraform plan -out=tfplan -no-color -input=false
          
          # 2. Extract the plan to a temporary string variable
          PLAN_OUTPUT=$(terraform show -no-color tfplan)
          
          # 3. THE UPGRADE: Extract the summary line before truncation
          # Uses grep to find the exact "Plan: X to add..." line so it never gets lost
          PLAN_SUMMARY=$(echo "$PLAN_OUTPUT" | grep -E 'Plan: [0-9]+ to add, [0-9]+ to change, [0-9]+ to destroy.' || echo "No infrastructure changes.")
          
          # 4. Truncate the output to 60,000 characters to respect GitHub PR comment limits
          if [ ${#PLAN_OUTPUT} -ge 60000 ]; then
            PLAN_OUTPUT="${PLAN_OUTPUT:0:60000}... [TRUNCATED: Plan is too large for GitHub comment. Check Actions tab for full plan.]"
          fi
          
          # 5. Save BOTH the summary and the plan safely to GITHUB_OUTPUT
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "$PLAN_SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          echo "stdout<<EOF" >> $GITHUB_OUTPUT
          echo "$PLAN_OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Update Pull Request with Plan
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        env:
          SUMMARY: "${{ steps.plan.outputs.summary }}"
          PLAN: "${{ steps.plan.outputs.stdout }}"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Inject the extracted SUMMARY variable at the very top, in bold
            const output = `#### Terraform Plan: \`${{ steps.plan.outcome }}\`
            
            **${process.env.SUMMARY}**
            
            <details><summary>Show Full Plan Details</summary>
            
            \`\`\`hcl\n
            ${process.env.PLAN}
            \`\`\`
            
            </details>
            
            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Terraform Apply (Main Branch Only)
        # Only runs if we are pushing to main AND the plan was successful
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && steps.plan.outcome == 'success'
        working-directory: ./terraform
        # Consumes the exact 'tfplan' file generated in the plan step
        run: terraform apply -auto-approve -input=false tfplan