name: "Zero-Tolerance FinOps Enterprise Pipeline"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  id-token: write      # Required for OIDC authentication with AWS
  contents: read
  pull-requests: write # Required so the bot can post comments on your PRs

jobs:
  # ==========================================
  # STAGE 1: QUALITY GATES (Format & Validate)
  # ==========================================
  quality-gates:
    name: "🧹 Quality & Syntax"
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        
      - name: 🛠️ Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: ⚙️ Terraform Init (provider only, no backend)
        working-directory: ./terraform
        run: terraform init -backend=false -no-color

      - name: 🧹 Terraform Format Check
        working-directory: ./terraform
        run: terraform fmt -check
        continue-on-error: true
        
      - name: 🛡️ Terraform Validate
        working-directory: ./terraform
        run: terraform validate -no-color

      - name: 🔍 Setup tflint
        uses: terraform-linters/setup-tflint@v4

      - name: 🧹 Terraform Linting (tflint)
        working-directory: ./terraform
        run: tflint --no-color

  # ==========================================
  # STAGE 2: SECURITY SCANS (tfsec & Checkov)
  # ==========================================
  security-scans:
    name: "🔒 Security Audit"
    needs: quality-gates    # <--- Waits for Stage 1 to pass
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔒 Security Scan (tfsec)
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: ./terraform
          soft_fail: true

      - name: 🔐 Checkov Security Scan       
        uses: bridgecrewio/checkov-action@master
        with:
          directory: ./terraform
          framework: terraform
          soft_fail: true

  # ==========================================
  # STAGE 3: EXECUTE (Plan & Deploy to AWS)
  # ==========================================
  deploy:
    name: "🚀 Execute Deployment"
    needs: security-scans   # <--- Waits for Stage 2 to pass
    runs-on: ubuntu-latest
    env:
      TF_VAR_security_alert_email: ${{ secrets.SECURITY_ALERT_EMAIL }}
      
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔑 Configure AWS Credentials (Passwordless OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: ap-south-1

      - name: 🛠️ Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: ⚙️ Terraform Init (Connect to AWS Backend)
        working-directory: ./terraform
        
        run: |
          terraform init -no-color \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET_NAME }}" \
            -backend-config="key=zero-tolerance/terraform.tfstate" \
            -backend-config="region=ap-south-1"

      

      - name: 📝 Terraform Plan
        id: plan
        working-directory: ./terraform
        run: |
          # 1. Run the plan and save it to the file 'tfplan'
          terraform plan -out=tfplan -no-color -input=false
          
          # 2. Convert the plan to text and save it to the GitHub variable 'stdout'
          echo "stdout<<EOF" >> $GITHUB_OUTPUT
          terraform show -no-color tfplan >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: 🤖 Update Pull Request with Plan
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        env:
          PLAN: "terraform\n${{ steps.plan.outputs.stdout }}"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Plan 📖\`${{ steps.plan.outcome }}\`
            
            <details><summary>Show Plan</summary>
            
            \`\`\`\n
            ${process.env.PLAN}
            \`\`\`
            
            </details>
            
            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: 💥 Terraform Apply (Main Branch Only)
        # Only runs if we are pushing to main AND the plan was successful
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && steps.plan.outcome == 'success'
        working-directory: ./terraform
        # Consumes the exact 'tfplan' file generated in the plan step
        run: terraform apply -auto-approve -input=false tfplan